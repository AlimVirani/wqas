<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Wikipedia QA — project overview</title>
<desc>Three bands summarizing the system (Claude plus MediaWiki loop), the prompt iteration path v0 to v2 with v3 rolled back, and the eval suite composition with current baseline pass rates.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-family: sans-serif; font-size: 14px; font-weight: 400; }
.ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; }
</style>
</defs>

<text class="ts" x="40" y="30">System</text>

<g><rect x="40" y="44" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="100" y="76" text-anchor="middle" fill="#2C2C2A">User question</text></g>
<line x1="160" y1="72" x2="208" y2="72" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="208" y="44" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="288" y="66" text-anchor="middle" fill="#3C3489">Claude</text>
<text class="ts" x="288" y="86" text-anchor="middle" fill="#534AB7">Tool-use loop</text></g>
<line x1="368" y1="72" x2="416" y2="72" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="416" y="44" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="496" y="66" text-anchor="middle" fill="#085041">MediaWiki API</text>
<text class="ts" x="496" y="86" text-anchor="middle" fill="#0F6E56">Lead-section extracts</text></g>
<line x1="416" y1="100" x2="368" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
<text class="ts" x="392" y="116" text-anchor="middle">extracts</text>

<g><rect x="208" y="124" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="288" y="151" text-anchor="middle" fill="#2C2C2A">Answer with citations</text></g>
<line x1="288" y1="100" x2="288" y2="124" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="40" y1="200" x2="640" y2="200" stroke="#B4B2A9" stroke-width="0.5"/>

<text class="ts" x="40" y="226">Prompt iteration</text>

<g><rect x="40" y="240" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="100" y="262" text-anchor="middle" fill="#2C2C2A">v0 baseline</text>
<text class="ts" x="100" y="282" text-anchor="middle" fill="#5F5E5A">Minimal prompt</text></g>
<line x1="160" y1="268" x2="188" y2="268" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="188" y="240" width="124" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="250" y="262" text-anchor="middle" fill="#0C447C">v1 grounding</text>
<text class="ts" x="250" y="282" text-anchor="middle" fill="#185FA5">Always search</text></g>
<line x1="312" y1="268" x2="340" y2="268" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="340" y="240" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="410" y="262" text-anchor="middle" fill="#085041">v2 calibration</text>
<text class="ts" x="410" y="282" text-anchor="middle" fill="#0F6E56">Abstain on insufficient</text></g>
<line x1="480" y1="268" x2="508" y2="268" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3 3"/>

<g><rect x="508" y="240" width="132" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="574" y="262" text-anchor="middle" fill="#791F1F">v3 rolled back</text>
<text class="ts" x="574" y="282" text-anchor="middle" fill="#A32D2D">Caught by evals</text></g>

<line x1="40" y1="328" x2="640" y2="328" stroke="#B4B2A9" stroke-width="0.5"/>

<text class="ts" x="40" y="354">Eval suite — 33 cases</text>

<g><rect x="40" y="368" width="180" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="130" y="392" text-anchor="middle" fill="#2C2C2A">base — 13</text>
<text class="ts" x="130" y="412" text-anchor="middle" fill="#5F5E5A">Simple, known,</text>
<text class="ts" x="130" y="426" text-anchor="middle" fill="#5F5E5A">multi-hop</text></g>

<g><rect x="230" y="368" width="180" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="320" y="392" text-anchor="middle" fill="#0C447C">product — 6</text>
<text class="ts" x="320" y="412" text-anchor="middle" fill="#185FA5">User-facing query</text>
<text class="ts" x="320" y="426" text-anchor="middle" fill="#185FA5">patterns</text></g>

<g><rect x="420" y="368" width="180" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="510" y="392" text-anchor="middle" fill="#712B13">hard — 14</text>
<text class="ts" x="510" y="412" text-anchor="middle" fill="#993C1D">Adversarial, safety,</text>
<text class="ts" x="510" y="426" text-anchor="middle" fill="#993C1D">fake entities</text></g>

<text class="ts" x="40" y="468">Baseline pass rates — v2 on 33-case suite</text>

<g><rect x="40" y="482" width="140" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="110" y="502" text-anchor="middle" fill="#5F5E5A">fact_recall</text>
<text class="th" x="110" y="528" text-anchor="middle" fill="#2C2C2A">25 / 26</text>
<text class="ts" x="110" y="544" text-anchor="middle" fill="#5F5E5A">automated</text></g>

<g><rect x="190" y="482" width="140" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="260" y="502" text-anchor="middle" fill="#5F5E5A">search_behavior</text>
<text class="th" x="260" y="528" text-anchor="middle" fill="#2C2C2A">30 / 33</text>
<text class="ts" x="260" y="544" text-anchor="middle" fill="#5F5E5A">automated</text></g>

<g><rect x="340" y="482" width="140" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="410" y="502" text-anchor="middle" fill="#534AB7">honest_failure</text>
<text class="th" x="410" y="528" text-anchor="middle" fill="#3C3489">7 / 7</text>
<text class="ts" x="410" y="544" text-anchor="middle" fill="#534AB7">LLM-judge</text></g>

<g><rect x="490" y="482" width="140" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="560" y="502" text-anchor="middle" fill="#534AB7">faithfulness</text>
<text class="th" x="560" y="528" text-anchor="middle" fill="#3C3489">24 / 30</text>
<text class="ts" x="560" y="544" text-anchor="middle" fill="#534AB7">LLM-judge</text></g>

</svg>
